<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexRes Hub v3 — 科研·学习一体化工作台</title>

<!-- External Libraries -->
<script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=IBM+Plex+Mono:wght@300;400;500&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">

<!-- Design System -->
<link rel="stylesheet" href="styles/tokens.css">
<link rel="stylesheet" href="styles/layout.css">
<link rel="stylesheet" href="styles/components.css">
<link rel="stylesheet" href="styles/themes.css">
</head>
<body>

<!-- ═══ SIDEBAR (injected by components/sidebar.js) ═══ -->
<div id="sidebar-root"></div>

<!-- ═══ MAIN CONTENT ═══ -->
<div class="main-content" id="main-content">

  <!-- Module containers — content injected by each module's .js -->
  <div id="module-dashboard"  class="module active"></div>
  <div id="module-literature" class="module"></div>
  <div id="module-methods"    class="module"></div>
  <div id="module-ml"         class="module"></div>
  <div id="module-explog"     class="module"></div>
  <div id="module-llm"        class="module"></div>
  <div id="module-writing"    class="module"></div>
  <div id="module-skillmap"   class="module"></div>

</div>

<!-- ═══ RIGHT COPILOT (injected by components/copilot.js) ═══ -->
<div id="copilot-root"></div>

<!-- ─── Data Layer ─── -->
<script type="module" src="data/papers.js"></script>
<script type="module" src="data/methods.js"></script>
<script type="module" src="data/experiments.js"></script>
<script type="module" src="data/writing.js"></script>

<!-- ─── Utils ─── -->
<script type="module" src="utils/api.js"></script>
<script type="module" src="utils/charts.js"></script>
<script type="module" src="utils/storage.js"></script>
<script type="module" src="utils/formatters.js"></script>

<!-- ─── Components ─── -->
<script type="module" src="components/sidebar.js"></script>
<script type="module" src="components/copilot.js"></script>
<script type="module" src="components/card.js"></script>

<!-- ─── Modules ─── -->
<script type="module" src="modules/dashboard.js"></script>
<script type="module" src="modules/literature.js"></script>
<script type="module" src="modules/methods.js"></script>
<script type="module" src="modules/ml-lab.js"></script>
<script type="module" src="modules/exp-log.js"></script>
<script type="module" src="modules/llm-arena.js"></script>
<script type="module" src="modules/writing.js"></script>
<script type="module" src="modules/skill-map.js"></script>

<!-- ─── App Shell (router — must load last) ─── -->
<script type="module" src="core/shell.js"></script>

</body>
</html>
